kind = "web"
previewPath = "/"
title = "Double Vision"
version = "1.0.0"
id = "artifacts/double-vision"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18835

[services.development]
run = "pnpm --filter @workspace/double-vision run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/double-vision", "run", "build" ]
publicDir = "artifacts/double-vision/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18835"
BASE_PATH = "/"
